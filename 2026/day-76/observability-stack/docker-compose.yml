services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    networks:
      - monitoring

  my-notes-app:
    image: manish12588/my-notes-app:latest
    container_name: my-notes-app
    ports:
      - "5000:5000"
    restart: unless-stopped
    command: >
      gunicorn
      --bind 0.0.0.0:5000
      --workers 1
      --access-logfile -
      --error-logfile -
      --log-level info
      app:app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - monitoring
  
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro          # ← this must include the Docker socket
      - /var/run/docker.sock:/var/run/docker.sock:ro   # ← add this explicitly
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro  
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    restart: unless-stopped
    networks:
      - monitoring

  loki:
   image: grafana/loki:latest
   container_name: loki
   ports:
     - "3100:3100"
   volumes:
     - ./loki/loki-config.yml:/etc/loki/loki-config.yml
     - loki_data:/loki
   command: -config.file=/etc/loki/loki-config.yml
   restart: unless-stopped
   networks:
     - monitoring

  promtail:
   image: grafana/promtail:latest
   container_name: promtail
   volumes:
     - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
     - /var/lib/docker/containers:/var/lib/docker/containers:ro
     - /var/run/docker.sock:/var/run/docker.sock
   command: -config.file=/etc/promtail/promtail-config.yml
   restart: unless-stopped
   networks:
     - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    restart: unless-stopped
    networks:
      - monitoring
      
volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  monitoring:
