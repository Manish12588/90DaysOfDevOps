kind: Pod
apiVersion: v1

metadata:
  name: pod-deletion-data-lost

spec:
  containers:
    - name: pod-deletion-data-lost
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
          echo "Timestamp: $(date):" >> /data/message.txt
          cat /data/message.txt
          echo ""
          sleep 15
          done

      volumeMounts:
        - name: empty-dir-volume
          mountPath: /data
  volumes:
    - name: empty-dir-volume
      emptyDir: {}