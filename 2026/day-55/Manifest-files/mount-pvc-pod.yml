kind: Pod
apiVersion: v1

metadata:
  name: mount-pvc

spec:
  containers:
    - name: mount-pvc
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
          echo "Hello From mount-pvc-pod at timestamp: $(date):" >> /data/message.txt
          cat /data/message.txt
          echo ""
          sleep 15
          done

      volumeMounts:
        - name: mount-pvc-volume
          mountPath: /data

  volumes:
    - name: mount-pvc-volume
      persistentVolumeClaim:
        claimName: persistent-volume-claim