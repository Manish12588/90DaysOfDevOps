kind: Pod
apiVersion: v1

metadata:
  name: live-config-pod

spec:
  containers:
    - name: live-config-pod
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
          echo "Reading config at $(date):"
          cat /etc/config/message
          echo ""
          sleep 5
          done

      volumeMounts:
        - name: config-volume
          mountPath: /etc/config
  volumes:
    - name: config-volume
      configMap:
        name: live-config-map