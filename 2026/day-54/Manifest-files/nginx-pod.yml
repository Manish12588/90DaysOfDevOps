apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
    volumeMounts:
      - name: nginx-volume
        mountPath: /etc/nginx/conf.d

  volumes:
    - name: nginx-volume
      configMap:
        name: nginx-config