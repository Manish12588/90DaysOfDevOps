kind: Pod
apiVersion: v1

metadata:
  name: busybox-pod

spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        ["/bin/sh", "-c", "printenv APP_ENV APP_DEBUG APP_PORT; sleep 3600"]
      envFrom:
        - configMapRef:
            name: busybox-config-map