services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────────────
  postgres_db:
    image: postgres:16-alpine          # Official Postgres image (lightweight)
    container_name: postgres_db
    restart: on-failure
    environment:
      POSTGRES_DB:       practicedb
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"                    # host:container
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persist data across restarts
    networks:
      - app_network

  # ── 2. Flask API ──────────────────────────────────────────────────────────
  flask_app:
    build: ./app                       # build from ./app/Dockerfile
    container_name: flask_app
    restart: unless-stopped
    environment:
      POSTGRES_HOST:     postgres_db   # Docker resolves this hostname on app_network
      POSTGRES_PORT:     5432
      POSTGRES_DB:       practicedb
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: secret
    #volumes:
    #  - build_data:/data               # stores build counter across restarts
    depends_on:
      - postgres_db                    # wait for postgres to start before Flask
    networks:
      - app_network

  # ── 3. Nginx (reverse proxy) ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "8080:80"                      # visit http://localhost:8080
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask_app
    networks:
      - app_network

  # ────────────────────────────────────────────────────────────────────────────
  # ADD NEW SERVICES BELOW THIS LINE (see README for step-by-step instructions)
  # ────────────────────────────────────────────────────────────────────────────

  # EXAMPLE – Redis (uncomment to add):
  # redis_cache:
  #   image: redis:7-alpine
  #   container_name: redis_cache
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - app_network

  # EXAMPLE – MySQL (uncomment to add):
  # mysql_db:
  #   image: mysql:8
  #   container_name: mysql_db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootsecret
  #     MYSQL_DATABASE:      practicedb
  #     MYSQL_USER:          admin
  #     MYSQL_PASSWORD:      secret
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   networks:
  #     - app_network


# ── Named volumes (persist data even after containers are removed) ────────────
volumes:
  postgres_data:
  #build_data:       # persists build counter
  # mysql_data:     # uncomment when you add MySQL

# ── Network (containers on the same network can reach each other by name) ─────
networks:
  app_network:
    driver: bridge