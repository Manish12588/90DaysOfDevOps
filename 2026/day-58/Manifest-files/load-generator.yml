apiVersion: v1
kind: Pod

metadata:
  name: load-generator
  labels:
    app: load-generator

spec:
  containers:
    - name: load-generator
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            wget -q -O- http://php-apache-server;   # ✅ matches your service name
          done

  restartPolicy: Never                              # matches --restart=Never