kind: Pod
apiVersion: v1

metadata:
  name: readiness-probe-pod
  labels:
    app: readiness-probe

spec:
  containers:
    - name: nginx
      image: nginx:latest
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3